name: Rust CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace (default features)
        run: cargo check --workspace

  check-features:
    name: "Check ${{ matrix.crate }} (${{ matrix.tier }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # hadris-io
          - crate: hadris-io
            tier: no-std
            features: ""
          - crate: hadris-io
            tier: std
            features: "std"

          # hadris-common
          - crate: hadris-common
            tier: no-std
            features: "sync,bytemuck,optical"
          - crate: hadris-common
            tier: alloc
            features: "alloc,sync,bytemuck,optical"
          - crate: hadris-common
            tier: std
            features: "std,sync,bytemuck,optical"

          # hadris-part
          - crate: hadris-part
            tier: no-std
            features: "sync,read"
          - crate: hadris-part
            tier: alloc
            features: "alloc,sync,read,write"
          - crate: hadris-part
            tier: std
            features: "std,sync,read,write"

          # hadris-fat
          - crate: hadris-fat
            tier: no-std
            features: "sync,read,lfn,cache,tool,exfat"
          - crate: hadris-fat
            tier: alloc
            features: "alloc,sync,read,lfn,cache,tool,exfat"
          - crate: hadris-fat
            tier: std
            features: "std,sync,read,write,lfn,cache,tool,exfat"

          # hadris-iso
          - crate: hadris-iso
            tier: no-std
            features: "sync,read,joliet"
          - crate: hadris-iso
            tier: alloc
            features: "alloc,sync,read,joliet"
          - crate: hadris-iso
            tier: std
            features: "std,sync,read,write,joliet"

          # hadris-udf
          - crate: hadris-udf
            tier: no-std
            features: "sync,read"
          - crate: hadris-udf
            tier: alloc
            features: "alloc,sync,read"
          - crate: hadris-udf
            tier: std
            features: "std,sync,read,write"

          # hadris-cpio
          - crate: hadris-cpio
            tier: no-std
            features: "sync,read"
          - crate: hadris-cpio
            tier: alloc
            features: "alloc,sync,read,write"
          - crate: hadris-cpio
            tier: std
            features: "std,sync,read,write"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check ${{ matrix.crate }} with features "${{ matrix.features }}"
        run: cargo check -p ${{ matrix.crate }} --no-default-features --features "${{ matrix.features }}"

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  test-exfat:
    name: Test exFAT (with external tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install exfatprogs
        run: |
          sudo apt-get update
          sudo apt-get install -y exfatprogs
          mkfs.exfat -V
          fsck.exfat -V || true
      - name: Run exFAT integration tests
        run: |
          cargo test -p hadris-fat --features "exfat,write" --test integration_exfat -- --nocapture
          cargo test -p hadris-fat --features "exfat,write" --test exfat_roundtrip -- --nocapture

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
