name: Rust CI

on:
  push:
    branches:
      - main
      - dev
      - v2-dev
  pull_request:
    branches:
      - main
      - v2-dev

# Least-privilege GITHUB_TOKEN. Without an explicit block the token inherits the
# repo/org default (often write), which CodeQL flags as
# `actions/missing-workflow-permissions` — a compromised step could otherwise
# push code, create releases, or modify settings. This workflow only needs to
# check out the tree.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Phase E v1: enforce @hadris-* annotation grammar (no cargo / no fuzz).
  # See docs/superpowers/specs/2026-07-09-spec-compliance-program-design.md §7.
  spec-annotations:
    name: Spec annotations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Self-test checker
        run: python3 scripts/check-spec-annotations.py --self-test
      - name: Check @hadris-* tags
        run: python3 scripts/check-spec-annotations.py

  public-api:
    name: Public API snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-public-api
        run: cargo install cargo-public-api --version 0.52.0 --locked
      - name: Check all-feature public API snapshots
        run: scripts/check-public-api.sh

  check:
    name: Check
    runs-on: ubuntu-latest
    # Promote rustc warnings to errors so issues like `unconditional_recursion`
    # (see issue #23) fail CI instead of slipping through.
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace (default features)
        run: cargo check --workspace

  check-features:
    name: "Check ${{ matrix.crate }} (${{ matrix.tier }})"
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    strategy:
      fail-fast: false
      matrix:
        include:
          # hadris-fixed
          - crate: hadris-fixed
            tier: no-std
            features: ""
          - crate: hadris-fixed
            tier: alloc-bytemuck
            features: "alloc,bytemuck"

          # hadris-path
          - crate: hadris-path
            tier: no-std
            features: ""
          - crate: hadris-path
            tier: alloc
            features: "alloc"

          # hadris-io
          - crate: hadris-io
            tier: no-std
            features: ""
          - crate: hadris-io
            tier: std
            features: "std"
          - crate: hadris-io
            tier: async
            features: "async,alloc"

          # hadris-common
          - crate: hadris-common
            tier: no-std
            features: "sync,bytemuck,optical"
          - crate: hadris-common
            tier: alloc
            features: "alloc,sync,bytemuck,optical"
          - crate: hadris-common
            tier: std
            features: "std,sync,bytemuck,optical"

          # hadris-storage
          - crate: hadris-storage
            tier: no-std-sync
            features: "sync"
          - crate: hadris-storage
            tier: no-std-async
            features: "async"
          - crate: hadris-storage
            tier: sync-and-async
            features: "alloc,sync,async"

          # hadris-part
          - crate: hadris-part
            tier: no-std
            features: "sync,read"
          - crate: hadris-part
            tier: alloc
            features: "alloc,sync,read,write"
          - crate: hadris-part
            tier: std
            features: "std,sync,read,write"
          - crate: hadris-part
            tier: async-read
            features: "async,read,alloc"
          - crate: hadris-part
            tier: hosted-async-read-write
            features: "std,async,read,write,crc,rand"
          - crate: hadris-part
            tier: sync-and-async-read-write
            features: "alloc,sync,async,read,write,crc"
          - crate: hadris-part
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write,crc,rand"
          - crate: hadris-part
            tier: crc
            features: "sync,read,alloc,crc"

          # hadris-fat
          - crate: hadris-fat
            tier: no-std
            features: "sync,read,lfn,cache,tool,unstable-exfat"
          - crate: hadris-fat
            tier: alloc
            features: "alloc,sync,read,lfn,cache,tool,unstable-exfat"
          - crate: hadris-fat
            tier: std
            features: "std,sync,read,write,lfn,cache,tool,unstable-exfat"
          - crate: hadris-fat
            tier: async-read
            features: "alloc,async,read,lfn"
          - crate: hadris-fat
            tier: hosted-async-read-write
            features: "std,async,read,write,lfn"
          - crate: hadris-fat
            tier: sync-and-async-read-write
            features: "alloc,sync,async,read,write,lfn,unstable-exfat"
          - crate: hadris-fat
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write,lfn,cache,tool,unstable-exfat,defmt,dirty-file-panic"

          # hadris-iso
          - crate: hadris-iso
            tier: no-std
            features: "sync,read,joliet"
          - crate: hadris-iso
            tier: alloc
            features: "alloc,sync,read,joliet"
          - crate: hadris-iso
            tier: std
            features: "std,sync,read,write,joliet"
          - crate: hadris-iso
            tier: async-read
            features: "alloc,async,read,joliet"
          - crate: hadris-iso
            tier: hosted-async-read
            features: "std,async,read,joliet"
          - crate: hadris-iso
            tier: sync-and-async-read
            features: "alloc,sync,async,read,joliet"
          - crate: hadris-iso
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write,joliet"

          # hadris-udf
          - crate: hadris-udf
            tier: no-std
            features: "sync,read"
          - crate: hadris-udf
            tier: alloc
            features: "alloc,sync,read"
          - crate: hadris-udf
            tier: std
            features: "std,sync,read,write"
          - crate: hadris-udf
            tier: async-read
            features: "alloc,async,read"
          - crate: hadris-udf
            tier: sync-and-async-read
            features: "alloc,sync,async,read"
          - crate: hadris-udf
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write"

          # hadris-cpio
          - crate: hadris-cpio
            tier: no-std
            features: "sync,read"
          - crate: hadris-cpio
            tier: alloc
            features: "alloc,sync,read,write"
          - crate: hadris-cpio
            tier: std
            features: "std,sync,read,write"
          - crate: hadris-cpio
            tier: async-read
            features: "alloc,async,read"
          - crate: hadris-cpio
            tier: hosted-async-read-write
            features: "std,async,read,write"
          - crate: hadris-cpio
            tier: sync-and-async-read-write
            features: "alloc,sync,async,read,write"
          - crate: hadris-cpio
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write"

          # hadris-cd (hybrid writer is intentionally sync-only)
          - crate: hadris-cd
            tier: no-api
            features: ""
          - crate: hadris-cd
            tier: hosted-sync-writer
            features: "std,sync"

          # standalone category facades
          - crate: hadris-block
            tier: no-formats
            features: ""
          - crate: hadris-block
            tier: no-std-async
            features: "alloc,async,read,detect,storage,fat,part"
          - crate: hadris-block
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write,detect,storage,fat,part"
          - crate: hadris-optical
            tier: no-formats
            features: ""
          - crate: hadris-optical
            tier: hosted-async-with-cd
            features: "std,async,read,open,cd"
          - crate: hadris-optical
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write,open,cd"
          - crate: hadris-archive
            tier: no-formats
            features: ""
          - crate: hadris-archive
            tier: async-read-write
            features: "alloc,async,read,write,cpio"
          - crate: hadris-archive
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write,cpio"

          # hadris umbrella/category forwarding
          - crate: hadris
            tier: no-formats
            features: ""
          - crate: hadris
            tier: leaf-fat
            features: "std,sync,read,write,fat"
          - crate: hadris
            tier: leaf-storage
            features: "std,sync,storage"
          - crate: hadris
            tier: leaf-path
            features: "alloc,path"
          - crate: hadris
            tier: leaf-fixed
            features: "alloc,fixed"
          - crate: hadris
            tier: leaf-part
            features: "std,sync,read,write,part"
          - crate: hadris
            tier: leaf-iso
            features: "std,sync,read,write,iso"
          - crate: hadris
            tier: leaf-udf
            features: "std,sync,read,write,udf"
          - crate: hadris
            tier: leaf-cd
            features: "std,cd"
          - crate: hadris
            tier: leaf-cpio
            features: "std,sync,read,write,cpio"
          - crate: hadris
            tier: no-std-async-block
            features: "alloc,async,read,block"
          - crate: hadris
            tier: hosted-async-optical
            features: "std,async,read,optical"
          - crate: hadris
            tier: dual-mode-archive
            features: "alloc,sync,async,read,write,archive"
          - crate: hadris
            tier: all-capabilities
            features: "std,alloc,sync,async,read,write,block,optical,archive"

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Check ${{ matrix.crate }} with features "${{ matrix.features }}"
        run: cargo check -p ${{ matrix.crate }} --no-default-features --features "${{ matrix.features }}"

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Run all-feature tests
        if: runner.os != 'Windows'
        run: cargo test --workspace --all-features
      # `hadris-fat/defmt` is an embedded logging integration. It can be
      # type-checked on every host, but its runtime symbols are supplied by an
      # embedded target and therefore cannot be linked into Windows test
      # executables. The feature matrix above still checks the complete feature
      # combination; Windows exercises the portable hosted defaults here.
      - name: Run portable hosted tests
        if: runner.os == 'Windows'
        run: |
          cargo test --workspace --all-features --exclude hadris-fat
          cargo test -p hadris-fat --features "std,alloc,sync,async,read,write,lfn,cache,tool,unstable-exfat,dirty-file-panic"
      - name: Run block async integration tests
        run: cargo test -p hadris-block --all-features --test async_volume
      - name: Run optical detection integration tests
        run: cargo test -p hadris-optical --all-features --test detect
      - name: Run optical opening integration tests
        run: cargo test -p hadris-optical --all-features --test open_image --test async_open_image
      - name: Run CPIO async writer integration test
        run: cargo test -p hadris-cpio --all-features --test async_writer

  test-exfat:
    name: Test exFAT (with external tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install exfatprogs
        run: |
          sudo apt-get update
          sudo apt-get install -y exfatprogs
      - name: Run exFAT integration tests
        run: |
          cargo test -p hadris-fat --features "unstable-exfat,write" --test integration_exfat -- --nocapture
          cargo test -p hadris-fat --features "unstable-exfat,write" --test exfat_roundtrip -- --nocapture

  test-optical:
    name: Test optical interoperability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install optical image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso udftools p7zip-full
      - name: Run ISO interoperability tests
        run: |
          cargo test -p hadris-iso --all-features \
            --test xorriso_basic \
            --test xorriso_advanced \
            --test xorriso_boot \
            --test xorriso_hybrid \
            -- --nocapture
      - name: Run UDF interoperability tests
        run: cargo test -p hadris-udf --all-features --test integration_external -- --nocapture
      - name: Qualify hybrid ISO/UDF images
        run: cargo test -p hadris-cd --all-features --test bridge_roundtrip -- --nocapture

  test-fat:
    name: Test FAT12/16/32 (with fsck.fat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install dosfstools
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools
      - name: Run FAT roundtrip tests
        run: |
          cargo test -p hadris-fat --features "write" --test fat_roundtrip -- --nocapture
      # `cache` is not a default feature, so the workspace `test` job never
      # exercises the FAT-sector cache, its routing on FatFs, or the
      # cache_integration suite. Run them explicitly here.
      - name: Run FAT cache tests
        run: |
          cargo test -p hadris-fat --features "cache,write,std" -- --nocapture

  # CLI --help/--version smoke tests live in crates/tools/hadris-*-cli/tests/cli_smoke.rs
  # and run under the workspace `test` job.

  doc:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --workspace
        run: cargo doc --workspace --no-deps
      - name: Compile rustdoc examples
        run: cargo test --workspace --doc
      - name: Compile Cargo example targets
        run: cargo check --workspace --all-features --examples

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  miri:
    name: Miri (UB detection)
    runs-on: ubuntu-latest
    # Miri runs Rust through an interpreter to catch undefined behavior at
    # runtime. We only point it at focused unit tests that exercise
    # historically-unsafe code paths (see issues #26 and #28). Miri is too slow
    # — and too restricted (no real I/O) — to run the full test suite, but
    # these targeted tests catch regressions cheaply.
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly toolchain with miri
        run: |
          rustup toolchain install nightly --component miri
          rustup +nightly component add miri
      - name: Setup miri
        run: cargo +nightly miri setup
      - uses: Swatinem/rust-cache@v2
      - name: Miri — hadris-common (FixedFilename safety)
        run: cargo +nightly miri test -p hadris-common --lib
      - name: Miri — hadris-fat (LFN UTF-16 / surrogate-pair safety)
        run: cargo +nightly miri test -p hadris-fat --lib file::lfn_unicode_tests
      - name: Miri — hadris-fat (LFN write encoding / union safety)
        run: cargo +nightly miri test -p hadris-fat --lib lfn_write_safety_tests
      - name: Miri — hadris-iso (IsoStr / IsoString safety)
        run: cargo +nightly miri test -p hadris-iso --lib types::iso_str_safety_tests
