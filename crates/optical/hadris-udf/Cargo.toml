[package]
name = "hadris-udf"
version = "2.0.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
description = "A rust implementation of the UDF (Universal Disk Format) filesystem."
keywords = ["udf", "dvd", "blu-ray", "optical", "filesystem"]
categories = ["filesystem", "encoding"]

[package.metadata.docs.rs]
features = ["std", "read", "write", "sync", "async"]
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["std", "read", "sync"]
# Read support
read = ["hadris-common/bytemuck"]
# Heap allocation without full std
alloc = ["hadris-io/alloc", "hadris-path/alloc"]
# Standard library support (includes alloc)
std = ["hadris-io/std", "hadris-common/std", "hadris-common/bytemuck", "alloc", "dep:thiserror"]
# Write/format support (requires std)
write = ["alloc", "std", "read"]
# Synchronous API
sync = ["hadris-io/sync", "hadris-common/sync"]
# Asynchronous API
async = ["hadris-io/async", "hadris-common/async"]

[dependencies]
bitflags = { workspace = true, features = ["bytemuck"] }
bytemuck = { workspace = true, features = ["derive"] }
thiserror = { workspace = true, optional = true }
hadris-io = { workspace = true }
hadris-path = { workspace = true }
hadris-macros = { workspace = true }
hadris-common = { workspace = true, features = ["alloc"] }
spin.workspace = true

[dev-dependencies]
static_assertions.workspace = true
tempfile.workspace = true
