[package]
name = "hadris-apfs-cli"
version = "2.0.0-rc.4"
description = "CLI utility for APFS container inspection"
readme = "README.md"
keywords = ["apfs", "filesystem", "cli", "disk"]
categories = ["command-line-utilities", "filesystem"]
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
autobins = false

[[bin]]
name = "hadris-apfs"
path = "src/bin/hadris-apfs.rs"
doc = false

[dependencies]
hadris-apfs = { workspace = true, features = ["std", "read", "sync", "tree"] }
hadris-storage = { workspace = true, features = ["std", "sync"] }
hadris-part = { workspace = true, features = ["std", "read", "sync"] }
clap.workspace = true
anyhow.workspace = true
