[package]
name = "hadris-fat-cli"
version = "2.0.0-rc.4"
description = "CLI utility for FAT filesystem analysis and management"
readme = "README.md"
keywords = ["fat", "fat32", "filesystem", "cli", "disk"]
categories = ["command-line-utilities", "filesystem"]
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
autobins = false

[[bin]]
name = "hadris-fat"
path = "src/bin/hadris-fat.rs"
doc = false

[[bin]]
name = "fatutil"
path = "src/bin/fatutil.rs"
doc = false

[dependencies]
hadris-fat = { workspace = true, features = ["std", "read", "write", "lfn", "tool"] }
clap.workspace = true
anyhow.workspace = true

[dev-dependencies]
tempfile.workspace = true
