[package]
name = "hadris-cpio-cli"
version = "2.0.0-rc.4"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI utility for CPIO archive operations"
readme = "README.md"
keywords = ["cpio", "archive", "cli", "disk"]
categories = ["command-line-utilities", "filesystem"]
autobins = false

[[bin]]
name = "hadris-cpio"
path = "src/bin/hadris-cpio.rs"
doc = false

[[bin]]
name = "cpioutil"
path = "src/bin/cpioutil.rs"
doc = false

[dependencies]
hadris-cpio = { workspace = true, features = ["std", "sync", "read", "write"] }
clap.workspace = true
anyhow.workspace = true
