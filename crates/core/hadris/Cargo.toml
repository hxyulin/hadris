[package]
name = "hadris"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme = "../../../README.md"
description = "A collection of crates for working with various file formats."
keywords = ["filesystem", "iso9660", "fat32", "udf", "cpio"]
categories = ["filesystem", "encoding"]

[features]
default = ["iso", "fat", "cpio"]
sync = ["hadris-fat?/sync", "hadris-part?/sync", "hadris-iso?/sync", "hadris-udf?/sync", "hadris-cd?/sync", "hadris-cpio?/sync"]
async = ["hadris-fat?/async", "hadris-part?/async", "hadris-iso?/async", "hadris-udf?/async", "hadris-cd?/async", "hadris-cpio?/async"]
block = ["fat", "part"]
optical = ["iso", "udf", "cd"]
archive = ["cpio"]
fat = ["dep:hadris-fat"]
part = ["dep:hadris-part"]
iso = ["dep:hadris-iso"]
udf = ["dep:hadris-udf"]
cd = ["dep:hadris-cd"]
cpio = ["dep:hadris-cpio"]

[dependencies]
hadris-iso = { workspace = true, optional = true, features = ["std", "write"] }
hadris-fat = { workspace = true, optional = true, features = ["std", "read", "write", "lfn"] }
hadris-part = { workspace = true, optional = true, features = ["std", "read", "write"] }
hadris-udf = { workspace = true, optional = true, features = ["std", "read"] }
hadris-cd = { workspace = true, optional = true, features = ["std"] }
hadris-cpio = { workspace = true, optional = true, features = ["std", "read", "write"] }
