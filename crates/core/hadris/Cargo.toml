[package]
name = "hadris"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme = "../../../README.md"
description = "A collection of crates for working with various file formats."
keywords = ["filesystem", "iso9660", "fat32", "udf", "cpio"]
categories = ["filesystem", "encoding"]

[features]
default = ["std", "sync", "read", "write", "iso", "fat", "cpio"]
std = ["alloc", "hadris-fat?/std", "hadris-part?/std", "hadris-iso?/std", "hadris-udf?/std", "hadris-cd?/std", "hadris-cpio?/std"]
alloc = ["hadris-fat?/alloc", "hadris-part?/alloc", "hadris-iso?/alloc", "hadris-udf?/alloc", "hadris-cpio?/alloc"]
read = ["hadris-fat?/read", "hadris-part?/read", "hadris-iso?/read", "hadris-udf?/read", "hadris-cpio?/read"]
write = ["alloc", "read", "hadris-fat?/write", "hadris-part?/write", "hadris-iso?/write", "hadris-udf?/write", "hadris-cpio?/write"]
sync = ["hadris-fat?/sync", "hadris-part?/sync", "hadris-iso?/sync", "hadris-udf?/sync", "hadris-cpio?/sync"]
async = ["hadris-fat?/async", "hadris-part?/async", "hadris-iso?/async", "hadris-udf?/async", "hadris-cpio?/async"]
block = ["fat", "part"]
optical = ["iso", "udf", "cd"]
archive = ["cpio"]
fat = ["dep:hadris-fat", "hadris-fat/lfn"]
part = ["dep:hadris-part"]
iso = ["dep:hadris-iso"]
udf = ["dep:hadris-udf"]
cd = ["dep:hadris-cd", "hadris-cd/sync"]
cpio = ["dep:hadris-cpio"]

[dependencies]
hadris-iso = { workspace = true, optional = true, default-features = false }
hadris-fat = { workspace = true, optional = true, default-features = false }
hadris-part = { workspace = true, optional = true, default-features = false }
hadris-udf = { workspace = true, optional = true, default-features = false }
hadris-cd = { workspace = true, optional = true, default-features = false }
hadris-cpio = { workspace = true, optional = true, default-features = false }
