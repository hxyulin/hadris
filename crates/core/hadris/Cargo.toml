[package]
name = "hadris"
version = "2.0.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme = "../../../README.md"
description = "A collection of crates for working with various file formats."
keywords = ["filesystem", "iso9660", "fat32", "udf", "cpio"]
categories = ["filesystem", "encoding"]

[features]
default = ["std", "sync", "read", "write", "fixed", "path", "iso", "fat", "cpio"]
std = ["alloc", "hadris-block?/std", "hadris-optical?/std", "hadris-archive?/std"]
alloc = ["hadris-fixed?/alloc", "hadris-path?/alloc", "hadris-block?/alloc", "hadris-optical?/alloc", "hadris-archive?/alloc"]
read = ["hadris-block?/read", "hadris-optical?/read", "hadris-archive?/read"]
write = ["alloc", "read", "hadris-block?/write", "hadris-optical?/write", "hadris-archive?/write"]
sync = ["hadris-block?/sync", "hadris-optical?/sync", "hadris-archive?/sync"]
async = ["hadris-block?/async", "hadris-optical?/async", "hadris-archive?/async"]
block = ["storage", "fat", "part", "hadris-block/detect"]
optical = ["iso", "udf", "cd", "hadris-optical/open"]
archive = ["cpio"]
path = ["dep:hadris-path"]
fixed = ["dep:hadris-fixed"]
storage = ["dep:hadris-block", "hadris-block/storage"]
fat = ["dep:hadris-block", "hadris-block/fat"]
part = ["dep:hadris-block", "hadris-block/part"]
iso = ["dep:hadris-optical", "hadris-optical/iso"]
udf = ["dep:hadris-optical", "hadris-optical/udf"]
cd = ["dep:hadris-optical", "hadris-optical/cd"]
cpio = ["dep:hadris-archive", "hadris-archive/cpio"]

[dependencies]
hadris-fixed = { workspace = true, optional = true, default-features = false }
hadris-path = { workspace = true, optional = true, default-features = false }
hadris-block = { workspace = true, optional = true, default-features = false }
hadris-optical = { workspace = true, optional = true, default-features = false }
hadris-archive = { workspace = true, optional = true, default-features = false }
